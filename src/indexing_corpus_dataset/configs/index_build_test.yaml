# ============================================================================
# Default config for src/indexing_corpus_dataset/index_builder_test.py
# ============================================================================
# Builds a small corpus (gold passages + distractors), indexes it, runs
# retrieval, and reports entity recall — a smoke test for the index pipeline.
#
# The frequently-varied knobs stay on the CLI and are NOT listed here:
#   --retriever  --dataset
#
# Everything else lives below.  Precedence (lowest -> highest):
#   built-in TEST_DEFAULTS  <  this file  <  explicit CLI override
# Use a different file with:  --config path/to/other.yaml
#
# Fields left as `null` are auto-derived at runtime (see index_build.yaml).
# ============================================================================

# ── Dataset selection (--retriever and --dataset are CLI) ─────────────
dataset_year: null      # neuclir: 2023|2024; trqa: test|validation; null = auto
subset: null            # neuclir: news|technical; trqa: wiki1|wiki2|ecommerce; null = auto
trqa_partial: true      # trqa: use wiki_partial corpus (vs full wiki) when true

# ── Path overrides (null = auto-derive from dataset/subset) ──────────────────
corpus_path: null       # FULL corpus JSONL (or glob); auto-selected if null
save_dir: null          # test index + outputs dir; null = a fresh temp dir
index_path: null        # explicit output index path; derived from corpus stem if null
embedding_path: null    # pre-computed embeddings (.memmap); skips encoding if set
data_path: null         # root for queries/qrels (local or s3://); null = canonical

# ── Index-build knobs ────────────────────────────────────────────────────────
max_length: 512         # max token length per passage (auto-raised for bcomp+qwen3)
batch_size: 16          # encoding batch size
faiss_type: Flat        # FAISS index factory string (dense retrievers)
save_embedding: true    # persist the encoded embeddings alongside the index
use_fp16: true          # encode in half precision
faiss_gpu: false        # build the FAISS index on GPU
device_id: null         # GPU device id (e.g. 0, 1); null = auto. Ignored for MPS

# ── Test-specific knobs ──────────────────────────────────────────────────────
query_key: null         # JSONL key for query text; null = auto ("text")
min_relevance_score: null  # min qrel score treated as relevant; null = auto per dataset
query_limit: 10         # max queries to use
sub_corpus_max_size: 2000  # gold + distractors up to this many; null = gold only
